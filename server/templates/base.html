<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}NIDS Dashboard{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --bg-void: #06080f;
      --bg-deep: #0b0f1a;
      --bg-card: #111827;
      --bg-card-hover: #1a2236;
      --bg-glass: rgba(17, 24, 39, 0.65);
      --border-glass: rgba(255, 255, 255, 0.06);
      --border-glow: rgba(139, 92, 246, 0.25);

      /* Vibrant palette */
      --neon-purple: #a855f7;
      --neon-blue: #3b82f6;
      --neon-cyan: #06b6d4;
      --neon-green: #10b981;
      --neon-amber: #f59e0b;
      --neon-rose: #f43f5e;
      --neon-pink: #ec4899;

      /* Gradients */
      --grad-purple: linear-gradient(135deg, #a855f7, #6366f1);
      --grad-blue: linear-gradient(135deg, #3b82f6, #06b6d4);
      --grad-green: linear-gradient(135deg, #10b981, #34d399);
      --grad-amber: linear-gradient(135deg, #f59e0b, #fbbf24);
      --grad-rose: linear-gradient(135deg, #f43f5e, #ec4899);
      --grad-hero: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background mesh */
    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 90%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
      z-index: 0;
      animation: meshFloat 20s ease-in-out infinite;
    }

    @keyframes meshFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, -1%) rotate(1deg); }
      66% { transform: translate(-1%, 2%) rotate(-1deg); }
    }

    /* ---- Navbar ---- */
    .top-bar {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      background: rgba(11, 15, 26, 0.75);
      border-bottom: 1px solid var(--border-glass);
      padding: .65rem 1.5rem;
    }

    .top-bar .brand {
      font-weight: 800;
      font-size: 1.15rem;
      background: var(--grad-hero);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: .5px;
    }

    .top-bar .brand i {
      -webkit-text-fill-color: var(--neon-purple);
      margin-right: 8px;
      filter: drop-shadow(0 0 6px rgba(168, 85, 247, .5));
    }

    .version-chip {
      background: var(--grad-purple);
      color: #fff;
      font-size: .65rem;
      padding: 2px 10px;
      border-radius: 12px;
      font-weight: 600;
      letter-spacing: .5px;
    }

    .refresh-time {
      font-size: .72rem;
      color: var(--text-muted);
    }

    /* ---- Sidebar ---- */
    .sidebar {
      position: sticky; top: 49px;
      width: 230px; flex-shrink: 0;
      min-height: calc(100vh - 49px);
      background: rgba(11, 15, 26, 0.5);
      backdrop-filter: blur(12px);
      border-right: 1px solid var(--border-glass);
      padding: 1.5rem .75rem;
      z-index: 50;
    }

    .sidebar .nav-link {
      color: var(--text-secondary) !important;
      padding: .6rem 1rem;
      border-radius: 10px;
      margin-bottom: 2px;
      font-size: .88rem;
      font-weight: 500;
      transition: all .25s cubic-bezier(.4,0,.2,1);
      position: relative;
    }

    .sidebar .nav-link:hover {
      color: var(--text-primary) !important;
      background: rgba(139, 92, 246, .08);
    }

    .sidebar .nav-link.active {
      color: #fff !important;
      background: linear-gradient(135deg, rgba(139,92,246,.2), rgba(59,130,246,.15));
      box-shadow: 0 0 20px rgba(139, 92, 246, .1);
    }

    .sidebar .nav-link.active::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 60%;
      background: var(--grad-purple);
      border-radius: 0 3px 3px 0;
    }

    .sidebar .nav-link i {
      width: 20px;
      text-align: center;
      margin-right: 10px;
      font-size: 1rem;
    }

    .sidebar .divider {
      border-top: 1px solid var(--border-glass);
      margin: .75rem .5rem;
    }

    /* ---- Stat Cards ---- */
    .stat-card {
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-glass);
      border-radius: 16px;
      padding: 1.5rem;
      transition: all .3s cubic-bezier(.4,0,.2,1);
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
    }

    .stat-card.purple::before { background: var(--grad-purple); }
    .stat-card.blue::before { background: var(--grad-blue); }
    .stat-card.amber::before { background: var(--grad-amber); }
    .stat-card.rose::before { background: var(--grad-rose); }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, .3);
      border-color: var(--border-glow);
    }

    .stat-card .stat-value {
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1;
    }

    .stat-card .stat-label {
      color: var(--text-muted);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 600;
      margin-bottom: .25rem;
    }

    .stat-card .stat-icon {
      font-size: 2.2rem;
      opacity: .4;
    }

    /* ---- Glass Cards ---- */
    .glass-card {
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-glass);
      border-radius: 16px;
      overflow: hidden;
    }

    .glass-card .card-header {
      background: rgba(255, 255, 255, .03);
      border-bottom: 1px solid var(--border-glass);
      padding: .85rem 1.25rem;
      font-weight: 600;
      font-size: .92rem;
    }

    /* ---- Tables ---- */
    .table { color: var(--text-primary); }

    .table-glass {
      --bs-table-bg: transparent;
      --bs-table-border-color: var(--border-glass);
    }

    .table-glass > thead > tr > th {
      border-bottom: 1px solid rgba(255,255,255,.08);
      color: var(--text-muted);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 600;
      padding: .75rem;
    }

    .table-glass > tbody > tr {
      transition: background .2s;
    }

    .table-glass > tbody > tr:hover {
      background: rgba(139, 92, 246, .06);
    }

    .table-glass > tbody > tr > td {
      padding: .7rem .75rem;
      vertical-align: middle;
      border-color: var(--border-glass);
    }

    /* ---- Badges ---- */
    .badge-critical {
      background: linear-gradient(135deg, rgba(244,63,94,.2), rgba(244,63,94,.1));
      color: #fb7185;
      border: 1px solid rgba(244,63,94,.2);
    }
    .badge-high {
      background: linear-gradient(135deg, rgba(245,158,11,.2), rgba(245,158,11,.1));
      color: #fbbf24;
      border: 1px solid rgba(245,158,11,.2);
    }
    .badge-medium {
      background: linear-gradient(135deg, rgba(6,182,212,.2), rgba(6,182,212,.1));
      color: #22d3ee;
      border: 1px solid rgba(6,182,212,.2);
    }
    .badge-low {
      background: linear-gradient(135deg, rgba(16,185,129,.2), rgba(16,185,129,.1));
      color: #34d399;
      border: 1px solid rgba(16,185,129,.2);
    }

    .badge-block {
      background: linear-gradient(135deg, rgba(244,63,94,.25), rgba(236,72,153,.15));
      color: #fb7185;
      border: 1px solid rgba(244,63,94,.2);
    }
    .badge-drop {
      background: linear-gradient(135deg, rgba(245,158,11,.25), rgba(245,158,11,.1));
      color: #fbbf24;
      border: 1px solid rgba(245,158,11,.2);
    }
    .badge-log {
      background: linear-gradient(135deg, rgba(59,130,246,.2), rgba(59,130,246,.1));
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,.2);
    }

    .badge-online {
      background: linear-gradient(135deg, rgba(16,185,129,.25), rgba(16,185,129,.1));
      color: #34d399;
      border: 1px solid rgba(16,185,129,.2);
    }
    .badge-offline {
      background: linear-gradient(135deg, rgba(244,63,94,.2), rgba(244,63,94,.1));
      color: #fb7185;
      border: 1px solid rgba(244,63,94,.15);
    }

    /* ---- Agent Cards ---- */
    .agent-card {
      background: rgba(17, 24, 39, .5);
      border: 1px solid var(--border-glass);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      transition: all .25s cubic-bezier(.4,0,.2,1);
    }

    .agent-card:hover {
      background: rgba(17, 24, 39, .8);
      border-color: var(--border-glow);
    }

    .agent-card.online { border-left: 3px solid var(--neon-green); }
    .agent-card.offline { border-left: 3px solid var(--neon-rose); }

    /* ---- Pulse ---- */
    .pulse-online {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--neon-green);
      box-shadow: 0 0 8px var(--neon-green), 0 0 16px rgba(16,185,129,.3);
      animation: pulseGlow 2s infinite;
    }

    .pulse-offline {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--neon-rose);
      box-shadow: 0 0 4px rgba(244,63,94,.4);
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 8px var(--neon-green), 0 0 16px rgba(16,185,129,.3); }
      50% { box-shadow: 0 0 12px var(--neon-green), 0 0 30px rgba(16,185,129,.4); }
    }

    /* ---- Animations ---- */
    .fade-in { animation: fadeSlide .5s cubic-bezier(.4,0,.2,1) both; }
    .fade-in-delay-1 { animation-delay: .1s; }
    .fade-in-delay-2 { animation-delay: .2s; }
    .fade-in-delay-3 { animation-delay: .3s; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: none; }
    }

    /* ---- Buttons ---- */
    .btn-glow {
      background: var(--grad-purple);
      color: #fff;
      border: none;
      font-weight: 600;
      font-size: .85rem;
      padding: .4rem 1rem;
      border-radius: 8px;
      transition: all .3s;
    }

    .btn-glow:hover {
      box-shadow: 0 0 20px rgba(168,85,247,.4);
      transform: translateY(-1px);
      color: #fff;
    }

    .btn-glass {
      background: rgba(255,255,255,.05);
      color: var(--text-secondary);
      border: 1px solid var(--border-glass);
      font-weight: 500;
      font-size: .82rem;
      padding: .35rem .85rem;
      border-radius: 8px;
      transition: all .2s;
    }

    .btn-glass:hover {
      background: rgba(255,255,255,.1);
      color: var(--text-primary);
      border-color: rgba(255,255,255,.15);
    }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(139,92,246,.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,.5); }

    /* ---- Code ---- */
    code { font-family: 'JetBrains Mono', monospace; font-size: .82em; }

    /* ---- Layout ---- */
    .main-wrapper { position: relative; z-index: 1; display: flex; }
    .main-content { flex: 1; padding: 1.75rem; min-width: 0; }

    /* Form controls */
    .form-control-glass, .form-select-glass {
      background: rgba(17,24,39,.6) !important;
      border: 1px solid var(--border-glass) !important;
      color: var(--text-primary) !important;
      border-radius: 8px;
      transition: border-color .2s;
    }
    .form-control-glass:focus, .form-select-glass:focus {
      border-color: var(--neon-purple) !important;
      box-shadow: 0 0 0 2px rgba(168,85,247,.15) !important;
    }
  </style>
  {% block extra_head %}{% endblock %}
  {% block extra_style %}<style></style>{% endblock %}
</head>

<body>
  <!-- Top Bar -->
  <nav class="top-bar d-flex align-items-center justify-content-between">
    <a class="brand text-decoration-none" href="/">
      <i class="bi bi-shield-fill-check"></i>NIDS Command Center
    </a>
    <div class="d-flex align-items-center gap-3">
      <span class="refresh-time" id="last-refresh"></span>
      <span class="version-chip">v2.0</span>
    </div>
  </nav>

  <div class="main-wrapper">
    <!-- Sidebar -->
    <div class="sidebar d-none d-md-block">
      <nav class="nav flex-column">
        <a href="/" class="nav-link {% if request.endpoint == 'dashboard.index' %}active{% endif %}">
          <i class="bi bi-grid-1x2-fill"></i>Dashboard
        </a>
        <a href="/alerts" class="nav-link {% if request.endpoint == 'dashboard.alerts_page' %}active{% endif %}">
          <i class="bi bi-exclamation-octagon-fill"></i>Alerts
        </a>
        <a href="/blocklist" class="nav-link {% if request.endpoint == 'dashboard.blocklist_page' %}active{% endif %}">
          <i class="bi bi-slash-circle-fill"></i>Blocklist
        </a>
      </nav>
    </div>

    <!-- Main -->
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function updateRefreshTime() {
      const el = document.getElementById('last-refresh');
      if (el) el.textContent = 'Updated ' + new Date().toLocaleTimeString();
    }
    updateRefreshTime();
  </script>
  {% block extra_scripts %}{% endblock %}
</body>

</html>
